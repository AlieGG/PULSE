<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PULSEMAP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    :root {
      --bg:      #06080a;
      --surface: #11161c;
      --panel:   #161d25;
      --border:  #1f2a36;
      --border2: #2c3a4a;
      --text:    #d8dde3;
      --muted:   #8b95a3;
      --dim:     #525d6c;
      --accent:  #ff4d5e;
      --cyan:    #00e1ff;
      --mono:    'JetBrains Mono', monospace;
      --sans:    'IBM Plex Sans', system-ui, sans-serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden }

    /* ── Header ── */
    #header {
      height: 44px; background: var(--panel); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 1rem; gap: .75rem;
      font-family: var(--mono); font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
    }
    .logo { color: var(--accent); font-weight: 700 }
    #header a { color: var(--dim); text-decoration: none; font-size: 10px }
    #header a:hover { color: var(--text) }
    #header-actions { margin-left: auto; display: flex; gap: .5rem; align-items: center }
    .hbtn {
      background: var(--surface); border: 1px solid var(--border2); color: var(--muted);
      font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
      padding: .3rem .7rem; border-radius: 4px; cursor: pointer;
    }
    .hbtn:hover { border-color: var(--cyan); color: var(--cyan) }
    .hbtn.primary { background: var(--accent); border-color: var(--accent); color: #fff }
    .hbtn.primary:hover { background: #cc2233 }

    /* ── Layout ── */
    #layout { display: flex; height: calc(100vh - 44px) }

    /* ── Left sidebar ── */
    #sidebar {
      width: 220px; flex-shrink: 0; background: var(--panel);
      border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
    }
    .sb-section { border-bottom: 1px solid var(--border) }
    .sb-section-header {
      padding: .5rem .75rem; display: flex; align-items: center; gap: .4rem;
      font-family: var(--mono); font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: var(--dim);
    }
    .sb-section-header .sbtn {
      margin-left: auto; background: none; border: 1px solid var(--border); color: var(--dim);
      font-family: var(--mono); font-size: 9px; letter-spacing: .1em; text-transform: uppercase;
      padding: .15rem .45rem; border-radius: 3px; cursor: pointer;
    }
    .sb-section-header .sbtn:hover { border-color: var(--cyan); color: var(--cyan) }
    .sb-scroll { overflow-y: auto }

    /* Controller row */
    .ctrl-row {
      border-left: 3px solid transparent; cursor: pointer;
    }
    .ctrl-row:hover { background: rgba(255,255,255,.03) }
    .ctrl-row.selected { border-left-color: var(--cyan) }
    .ctrl-row-header {
      display: flex; align-items: center; gap: .45rem; padding: .35rem .75rem;
      font-size: 12px;
    }
    .ctrl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0 }
    .ctrl-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
    .ctrl-badge {
      font-family: var(--mono); font-size: 8px; padding: .1rem .3rem;
      border-radius: 3px; background: var(--surface); color: var(--dim);
    }
    .ctrl-expand { background: none; border: none; color: var(--dim); font-size: 10px; cursor: pointer; padding: 0 2px }

    /* Segment rows (inside controller) */
    .seg-rows { padding-left: 1.1rem; border-bottom: 1px solid var(--border) }
    .seg-row {
      display: flex; align-items: center; gap: .4rem; padding: .25rem .5rem;
      font-size: 11px; color: var(--muted); cursor: pointer; border-left: 2px solid transparent;
    }
    .seg-row:hover { color: var(--text) }
    .seg-row.selected { border-left-color: var(--cyan); color: var(--text) }
    .seg-pip { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0 }
    .seg-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
    .seg-range { font-family: var(--mono); font-size: 8px; color: var(--dim) }

    /* Zone rows */
    .zone-row {
      display: flex; align-items: center; gap: .45rem; padding: .35rem .75rem;
      font-size: 12px; cursor: pointer; border-left: 3px solid transparent;
    }
    .zone-row:hover { background: rgba(255,255,255,.03) }
    .zone-row.selected { background: rgba(255,77,94,.06); border-left-color: var(--accent) }
    .zone-swatch { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0 }
    .zone-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
    .zone-count { font-family: var(--mono); font-size: 9px; color: var(--dim) }

    .icon-btn {
      width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
      background: none; border: 1px solid transparent; border-radius: 3px;
      color: var(--dim); font-size: 12px; cursor: pointer; flex-shrink: 0;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent) }

    /* ── Canvas ── */
    #canvas-wrap { flex: 1; position: relative; overflow: hidden; background: var(--bg) }
    #stage-canvas { width: 100%; height: 100%; display: block }
    #stage-canvas.pan { cursor: grab }
    #stage-canvas.pan.dragging { cursor: grabbing }

    /* ── Toolbar ── */
    #toolbar {
      position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%);
      background: var(--panel); border: 1px solid var(--border2); border-radius: 8px;
      display: flex; align-items: center; gap: 2px; padding: 4px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    .tool-btn {
      background: none; border: none; border-radius: 5px; color: var(--muted);
      font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
      padding: .35rem .65rem; cursor: pointer;
    }
    .tool-btn:hover  { background: var(--surface); color: var(--text) }
    .tool-btn.active { background: rgba(255,77,94,.15); color: var(--accent) }
    .tool-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px }
    .zoom-btn {
      background: none; border: none; color: var(--muted); font-size: 14px;
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; border-radius: 4px;
    }
    .zoom-btn:hover { background: var(--surface); color: var(--text) }
    #zoom-label { font-family: var(--mono); font-size: 10px; color: var(--dim); width: 36px; text-align: center }

    /* ── Right panel ── */
    #props {
      width: 248px; flex-shrink: 0; background: var(--panel);
      border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto;
    }
    .props-title {
      padding: .55rem .85rem; border-bottom: 1px solid var(--border);
      font-family: var(--mono); font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: var(--dim);
    }
    .prop { padding: .35rem .85rem; display: flex; flex-direction: column; gap: .2rem }
    .prop-label { font-family: var(--mono); font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--dim) }
    .prop-input, .prop-select {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      font-family: var(--mono); font-size: 11px; padding: .3rem .5rem; border-radius: 3px; width: 100%;
    }
    .prop-input:focus, .prop-select:focus { outline: none; border-color: var(--cyan) }
    .prop-row2 { display: flex; gap: .4rem }
    .prop-row2 .prop { flex: 1; padding-left: 0; padding-right: 0 }
    .prop-divider { height: 1px; background: var(--border); margin: .2rem .85rem }
    .prop-hint { font-size: 11px; color: var(--muted); line-height: 1.45 }
    .color-row { display: flex; gap: .3rem; flex-wrap: wrap }
    .color-chip {
      width: 20px; height: 20px; border-radius: 4px; cursor: pointer;
      border: 2px solid transparent; flex-shrink: 0;
    }
    .color-chip.sel { border-color: #fff }
    .prop-action {
      background: var(--surface); border: 1px solid var(--border2); color: var(--muted);
      font-family: var(--mono); font-size: 9px; letter-spacing: .1em; text-transform: uppercase;
      padding: .25rem .5rem; border-radius: 3px; cursor: pointer; width: 100%;
    }
    .prop-action:hover { border-color: var(--cyan); color: var(--cyan) }
    .prop-action.danger:hover { border-color: var(--accent); color: var(--accent) }

    /* ── Modals ── */
    .overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(6,8,10,.82); backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    .overlay.open { display: flex }
    .modal {
      width: min(460px, 95vw); background: var(--surface);
      border: 1px solid var(--border2); border-radius: 10px;
      box-shadow: 0 32px 80px rgba(0,0,0,.7); overflow: hidden;
    }
    .modal-header {
      padding: .65rem 1rem; background: var(--panel); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      font-family: var(--mono); font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: var(--accent);
    }
    .modal-close { background: none; border: none; color: var(--dim); font-size: 1.1rem; cursor: pointer }
    .modal-close:hover { color: var(--text) }
    .modal-body { padding: 1rem; display: flex; flex-direction: column; gap: .7rem }
    .modal-footer { padding: .65rem 1rem; border-top: 1px solid var(--border); background: var(--panel); display: flex; gap: .5rem; justify-content: flex-end }
    .field { display: flex; flex-direction: column; gap: .25rem }
    .field label { font-family: var(--mono); font-size: 9px; letter-spacing: .15em; text-transform: uppercase; color: var(--dim) }
    .field input, .field select {
      background: var(--bg); border: 1px solid var(--border2); color: var(--text);
      font-family: var(--mono); font-size: 12px; padding: .4rem .6rem; border-radius: 4px;
    }
    .field input:focus, .field select:focus { outline: none; border-color: var(--cyan) }
    .field-row { display: flex; gap: .5rem }
    .field-row .field { flex: 1 }
    .status-msg { font-family: var(--mono); font-size: 11px; color: var(--muted); min-height: 1.3em }
    .status-msg.ok  { color: #10b981 }
    .status-msg.err { color: var(--accent) }
    .import-preview {
      background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
      padding: .6rem .85rem; font-family: var(--mono); font-size: 10px;
      color: var(--muted); line-height: 1.8; display: none;
    }
    .import-preview.show { display: block }
    .seg-chip {
      display: inline-block; font-family: var(--mono); font-size: 9px;
      padding: .1rem .35rem; border-radius: 3px; margin: .15rem .15rem 0 0;
    }
  </style>
</head>
<body>

<div id="header">
  <span class="logo">Pulse<span style="color:var(--text)">map</span></span>
  <a href="/">Deck</a>
  <a href="/forge/">Forge</a>
  <div id="header-actions">
    <button class="hbtn" id="btn-load">Load</button>
    <button class="hbtn primary" id="btn-save">Save Topology</button>
    <button class="hbtn" id="map-bug-btn" title="Report a bug" style="border-color:transparent;color:var(--dim)">⚠</button>
  </div>
</div>

<div id="layout">

  <!-- ── Left sidebar ── -->
  <div id="sidebar">
    <div class="sb-section">
      <div class="sb-section-header">
        Controllers
        <button class="sbtn" id="btn-add-ctrl">+ Add</button>
        <button class="sbtn" id="btn-import-pb" style="margin-left:.25rem">⬇ PB</button>
      </div>
      <div class="sb-scroll" id="ctrl-list" style="max-height:50vh"></div>
    </div>
    <div class="sb-section" style="flex:1;display:flex;flex-direction:column">
      <div class="sb-section-header">
        Zones
        <button class="sbtn" id="btn-add-zone">+ Add</button>
      </div>
      <div class="sb-scroll" id="zone-list"></div>
    </div>
  </div>

  <!-- ── Canvas ── -->
  <div id="canvas-wrap">
    <canvas id="stage-canvas"></canvas>
    <div id="toolbar">
      <button class="tool-btn active" data-tool="select">▸ Select</button>
      <button class="tool-btn" data-tool="pan">✥ Pan</button>
      <div class="tool-sep"></div>
      <button class="zoom-btn" id="zoom-out">−</button>
      <div id="zoom-label">100%</div>
      <button class="zoom-btn" id="zoom-in">+</button>
      <button class="zoom-btn" id="zoom-fit" title="Fit all">⊡</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" id="toggle-wires" title="Toggle wiring lines">⌇ Wires</button>
    </div>
  </div>

  <!-- ── Right panel ── -->
  <div id="props">
    <div class="props-title" id="props-title">Nothing selected</div>
    <div id="props-body">
      <div class="prop"><p class="prop-hint" style="padding:.5rem 0;color:var(--dim)">Click a controller or segment on the canvas, or select from the sidebar.</p></div>
    </div>
  </div>
</div>

<!-- ── Add Controller modal ── -->
<div class="overlay" id="modal-add-ctrl">
  <div class="modal">
    <div class="modal-header">Add Controller <button class="modal-close" data-close="modal-add-ctrl">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Name</label><input id="ac-name" placeholder="Stage Left PB" /></div>
      <div class="field-row">
        <div class="field"><label>IP Address</label><input id="ac-ip" placeholder="192.168.1.100" /></div>
        <div class="field" style="max-width:100px"><label>Pixels</label><input id="ac-px" type="number" value="144" min="1" max="8192" /></div>
      </div>
      <div class="field">
        <label>Geometry</label>
        <select id="ac-geo">
          <option value="1d">1D — Linear strip</option>
          <option value="2d">2D — Matrix / panel</option>
          <option value="3d">3D — Volume</option>
        </select>
      </div>
      <div class="field">
        <label>Segments (optional — split by index ranges)</label>
        <div id="ac-seg-list" style="display:flex;flex-direction:column;gap:.3rem;margin-top:.2rem"></div>
        <button class="prop-action" id="ac-add-seg" style="margin-top:.3rem">+ Add segment</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="hbtn" data-close="modal-add-ctrl">Cancel</button>
      <button class="hbtn primary" id="btn-ac-confirm">Add to Stage</button>
    </div>
  </div>
</div>

<!-- ── Import from Pixelblaze modal ── -->
<div class="overlay" id="modal-import">
  <div class="modal">
    <div class="modal-header">Import from Pixelblaze <button class="modal-close" data-close="modal-import">✕</button></div>
    <div class="modal-body">
      <p class="prop-hint">Connect to a live Pixelblaze to pull its pixel count, mapped LED positions, and Output Expander channel layout.</p>
      <div class="field-row">
        <div class="field" style="flex:2"><label>IP Address</label><input id="pb-ip" placeholder="192.168.1.100" /></div>
        <div class="field" style="align-self:flex-end;flex:0">
          <button class="hbtn" id="btn-pb-connect" style="white-space:nowrap">Connect</button>
        </div>
      </div>
      <div class="status-msg" id="pb-status"></div>
      <div class="import-preview" id="pb-preview"></div>
    </div>
    <div class="modal-footer">
      <button class="hbtn" data-close="modal-import">Cancel</button>
      <button class="hbtn primary" id="btn-pb-add" disabled>Add to Stage</button>
    </div>
  </div>
</div>

<!-- ── Add Zone modal ── -->
<div class="overlay" id="modal-add-zone">
  <div class="modal">
    <div class="modal-header">Add Zone <button class="modal-close" data-close="modal-add-zone">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Zone Name</label><input id="az-name" placeholder="Stage Left" /></div>
      <div class="field">
        <label>Colour</label>
        <div class="color-row" id="az-color-row"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="hbtn" data-close="modal-add-zone">Cancel</button>
      <button class="hbtn primary" id="btn-az-confirm">Create Zone</button>
    </div>
  </div>
</div>

<script>
'use strict'

// ── Palette ───────────────────────────────────────────────────────────────────
const CTRL_COLORS = ['#00e1ff','#7c3aed','#10b981','#f59e0b','#f43f5e','#3b82f6','#ec4899','#84cc16']
const ZONE_COLORS = ['#ff4d5e','#00e1ff','#10b981','#f59e0b','#7c3aed','#3b82f6']

let _colorIdx = 0
function nextCtrlColor() { return CTRL_COLORS[_colorIdx++ % CTRL_COLORS.length] }

let _zoneColorIdx = 0
function nextZoneColor() { return ZONE_COLORS[_zoneColorIdx++ % ZONE_COLORS.length] }

function uid() { return Math.random().toString(36).slice(2, 9) }

// ── State ─────────────────────────────────────────────────────────────────────
/*
  Controller: { id, name, ip, pixelCount, geometry, color, zoneId, expanded, segments[] }
  Segment:    { id, name, start, end, x, y, scale, pixels, _cx, _cy }
    pixels: [[px,py],...] normalized 0-1 in Pixelblaze space (or null → synthetic)
    _cx/_cy: cached centroid of pixels (computed on load)
  Zone:       { id, name, color, controllers[] }
*/
const S = {
  controllers: [],
  zones: [],
  selected: null, // { type:'controller'|'segment'|'zone', controllerId, segmentId?, id? }
  tool: 'select',
  showWires: true,
  view: { x: 80, y: 60, zoom: 0.85 },
  drag: null,
  dirty: false,
}

const STAGE_W = 1000
const STAGE_H = 600

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('stage-canvas')
const ctx    = canvas.getContext('2d')
const dpr    = () => window.devicePixelRatio || 1

function resize() {
  const r = canvas.parentElement.getBoundingClientRect()
  canvas.width  = r.width  * dpr()
  canvas.height = r.height * dpr()
  canvas.style.width  = r.width  + 'px'
  canvas.style.height = r.height + 'px'
  render()
}

// ── Coordinate transforms ─────────────────────────────────────────────────────
function s2c(sx, sy) { return [sx * S.view.zoom + S.view.x, sy * S.view.zoom + S.view.y] }
function c2s(cx, cy) { return [(cx - S.view.x) / S.view.zoom, (cy - S.view.y) / S.view.zoom] }

// ── Segment helpers ───────────────────────────────────────────────────────────

function segCentroid(seg) {
  if (seg._cx != null) return [seg._cx, seg._cy]
  if (!seg.pixels?.length) return [0.5, 0.5]
  let sx = 0, sy = 0
  for (const [px, py] of seg.pixels) { sx += px; sy += py }
  seg._cx = sx / seg.pixels.length
  seg._cy = sy / seg.pixels.length
  return [seg._cx, seg._cy]
}

// Get canvas position of pixel i in segment
function pixelCanvas(seg, i) {
  const [cx, cy] = segCentroid(seg)
  let px, py
  if (seg.pixels) {
    ;[px, py] = seg.pixels[i]
  } else {
    // Synthetic: horizontal strip
    const count = seg.end - seg.start + 1
    px = count > 1 ? i / (count - 1) : 0.5
    py = 0.5
  }
  const sx = seg.x + (px - cx) * seg.scale
  const sy = seg.y + (py - cy) * seg.scale
  return s2c(sx, sy)
}

function segBounds(seg) {
  const count = seg.pixels ? seg.pixels.length : (seg.end - seg.start + 1)
  let mnx = Infinity, mny = Infinity, mxx = -Infinity, mxy = -Infinity
  for (let i = 0; i < count; i++) {
    const [cx, cy] = pixelCanvas(seg, i)
    if (cx < mnx) mnx = cx; if (cx > mxx) mxx = cx
    if (cy < mny) mny = cy; if (cy > mxy) mxy = cy
  }
  const pad = 10
  return { x: mnx - pad, y: mny - pad, w: mxx - mnx + pad*2, h: mxy - mny + pad*2 }
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function render() {
  const W = canvas.width / dpr()
  const H = canvas.height / dpr()

  ctx.save()
  ctx.clearRect(0, 0, W, H)

  // Grid
  ctx.strokeStyle = '#0e1520'; ctx.lineWidth = 1
  const gs = 50 * S.view.zoom
  const ox = S.view.x % gs, oy = S.view.y % gs
  for (let x = ox; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke() }
  for (let y = oy; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke() }

  // Stage boundary
  const [bx0, by0] = s2c(0, 0)
  const [bx1, by1] = s2c(STAGE_W, STAGE_H)
  ctx.strokeStyle = '#1f2a36'; ctx.lineWidth = 1.5; ctx.setLineDash([6, 4])
  ctx.strokeRect(bx0, by0, bx1 - bx0, by1 - by0)
  ctx.setLineDash([])
  ctx.font = `9px 'JetBrains Mono', monospace`
  ctx.fillStyle = '#2c3a4a'; ctx.fillText('STAGE', bx0 + 8, by0 + 14)

  // Controllers → segments
  for (const ctrl of S.controllers) {
    const zone = ctrl.zoneId ? S.zones.find(z => z.id === ctrl.zoneId) : null
    const baseColor = zone ? zone.color : ctrl.color
    const segCount = ctrl.segments.length
    for (let si = 0; si < segCount; si++) {
      const seg = ctrl.segments[si]
      const isSel = S.selected?.type === 'segment' && S.selected?.segmentId === seg.id
      const isCtrlSel = S.selected?.type === 'controller' && S.selected?.controllerId === ctrl.id
      drawSegment(seg, baseColor, si, segCount, isSel || isCtrlSel)
    }
    // Controller name label above first segment
    drawControllerLabel(ctrl, zone)
  }

  ctx.restore()
}

function segmentColor(baseColor, segIndex, segCount) {
  // Shade segments within a controller so they're distinguishable
  if (segCount <= 1) return baseColor
  const ratio = 0.6 + 0.4 * (segIndex / (segCount - 1))
  return scaleHex(baseColor, ratio)
}

function drawSegment(seg, baseColor, segIndex, segCount, isSelected) {
  const color = segmentColor(baseColor, segIndex, segCount)
  const count = seg.pixels ? seg.pixels.length : (seg.end - seg.start + 1)
  if (count === 0) return

  const dotR = Math.max(2, Math.min(5, 200 * S.view.zoom / count))

  // Wiring lines
  if (S.showWires && count <= 400) {
    ctx.save()
    ctx.strokeStyle = hexA(color, 0.35)
    ctx.lineWidth   = 1
    ctx.beginPath()
    const [fx, fy] = pixelCanvas(seg, 0)
    ctx.moveTo(fx, fy)
    for (let i = 1; i < count; i++) {
      const [px, py] = pixelCanvas(seg, i)
      ctx.lineTo(px, py)
    }
    ctx.stroke()
    ctx.restore()
  }

  // Dots
  ctx.save()
  for (let i = 0; i < count; i++) {
    const [px, py] = pixelCanvas(seg, i)
    ctx.fillStyle = color
    ctx.globalAlpha = 0.88
    ctx.beginPath(); ctx.arc(px, py, dotR, 0, Math.PI * 2); ctx.fill()
  }
  ctx.globalAlpha = 1

  // Segment label (centroid)
  const [cx, cy] = segCentroid(seg)
  const [lx, ly] = s2c(seg.x + (cx - cx) * seg.scale, seg.y)
  const [labelX] = s2c(seg.x, seg.y)
  ctx.font = `bold 9px 'JetBrains Mono', monospace`
  ctx.fillStyle = color; ctx.textAlign = 'center'
  ctx.fillText(seg.name.toUpperCase(), labelX, ly - dotR - 4)
  ctx.textAlign = 'left'
  ctx.restore()

  // Selection highlight
  if (isSelected) {
    const b = segBounds(seg)
    ctx.save()
    ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.setLineDash([4, 3])
    ctx.strokeRect(b.x, b.y, b.w, b.h)
    ctx.setLineDash([])
    ctx.restore()
  }
}

function drawControllerLabel(ctrl, zone) {
  if (!ctrl.segments.length) return
  const seg0 = ctrl.segments[0]
  const [lx, ly] = s2c(seg0.x, seg0.y)
  const count = seg0.pixels ? seg0.pixels.length : (seg0.end - seg0.start + 1)
  const dotR = Math.max(2, Math.min(5, 200 * S.view.zoom / count))
  const bounds = segBounds(seg0)

  ctx.save()
  ctx.font = `10px 'JetBrains Mono', monospace`
  ctx.fillStyle = zone ? zone.color : ctrl.color
  ctx.globalAlpha = 0.7
  ctx.textAlign = 'center'
  ctx.fillText(ctrl.name, (bounds.x + bounds.x + bounds.w) / 2, bounds.y - 4)
  ctx.textAlign = 'left'
  ctx.globalAlpha = 1
  ctx.restore()
}

// ── Colour helpers ────────────────────────────────────────────────────────────
function hexA(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16)
  return `rgba(${r},${g},${b},${a})`
}

function scaleHex(hex, f) {
  const r = Math.min(255, Math.round(parseInt(hex.slice(1,3),16) * f))
  const g = Math.min(255, Math.round(parseInt(hex.slice(3,5),16) * f))
  const b = Math.min(255, Math.round(parseInt(hex.slice(5,7),16) * f))
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`
}

function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

// ── Hit testing ───────────────────────────────────────────────────────────────
function hitTestSegment(cx, cy) {
  for (let ci = S.controllers.length - 1; ci >= 0; ci--) {
    const ctrl = S.controllers[ci]
    for (let si = ctrl.segments.length - 1; si >= 0; si--) {
      const seg = ctrl.segments[si]
      const b = segBounds(seg)
      if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) {
        return { controllerId: ctrl.id, segmentId: seg.id }
      }
    }
  }
  return null
}

// ── Input handling ────────────────────────────────────────────────────────────
let mouse = { x: 0, y: 0 }

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect()
  mouse = { x: e.clientX - r.left, y: e.clientY - r.top }

  if (!S.drag) return
  if (S.drag.type === 'pan') {
    S.view.x += e.movementX; S.view.y += e.movementY; render(); return
  }
  if (S.drag.type === 'segment') {
    const [sx, sy] = c2s(mouse.x, mouse.y)
    const dx = sx - S.drag.lastSX, dy = sy - S.drag.lastSY
    S.drag.lastSX = sx; S.drag.lastSY = sy

    if (e.shiftKey) {
      // Move all segments of this controller
      const ctrl = S.controllers.find(c => c.id === S.drag.controllerId)
      if (ctrl) ctrl.segments.forEach(seg => { seg.x += dx; seg.y += dy })
    } else {
      const ctrl = S.controllers.find(c => c.id === S.drag.controllerId)
      const seg  = ctrl?.segments.find(s => s.id === S.drag.segmentId)
      if (seg) { seg.x += dx; seg.y += dy }
    }
    S.dirty = true; render()
  }
})

canvas.addEventListener('mousedown', e => {
  const r = canvas.getBoundingClientRect()
  const cx = e.clientX - r.left, cy = e.clientY - r.top

  if (S.tool === 'pan' || e.button === 1 || (e.button === 0 && e.altKey)) {
    S.drag = { type: 'pan' }; canvas.classList.add('dragging'); return
  }

  if (e.button === 0) {
    const hit = hitTestSegment(cx, cy)
    if (hit) {
      const [sx, sy] = c2s(cx, cy)
      S.selected = { type: 'segment', controllerId: hit.controllerId, segmentId: hit.segmentId }
      S.drag = { type: 'segment', ...hit, lastSX: sx, lastSY: sy }
    } else {
      S.selected = null
    }
    renderSidebar(); renderProps(); render()
  }
})

canvas.addEventListener('mouseup', () => { S.drag = null; canvas.classList.remove('dragging') })

canvas.addEventListener('wheel', e => {
  e.preventDefault()
  const r = canvas.getBoundingClientRect()
  const mx = e.clientX - r.left, my = e.clientY - r.top
  const f = e.deltaY < 0 ? 1.1 : 0.9
  S.view.x = mx - (mx - S.view.x) * f
  S.view.y = my - (my - S.view.y) * f
  S.view.zoom = Math.max(0.1, Math.min(5, S.view.zoom * f))
  updateZoom(); render()
}, { passive: false })

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return
  if (e.key === 'v' || e.key === 'V') setTool('select')
  if (e.key === 'p' || e.key === 'P') setTool('pan')
  if (e.key === ' ') { e.preventDefault(); setTool('pan') }
  if (e.key === 'Escape') { S.selected = null; renderSidebar(); renderProps(); render() }
  if ((e.key === 'Delete' || e.key === 'Backspace') && S.selected) deleteSelected()
})
document.addEventListener('keyup', e => { if (e.key === ' ') setTool('select') })

// ── Tool management ───────────────────────────────────────────────────────────
function setTool(t) {
  S.tool = t
  document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.toggle('active', b.dataset.tool === t))
  canvas.className = t === 'pan' ? 'pan' : ''
}

document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.addEventListener('click', () => setTool(b.dataset.tool)))

document.getElementById('zoom-in').addEventListener('click',  () => { S.view.zoom = Math.min(5, S.view.zoom * 1.2); updateZoom(); render() })
document.getElementById('zoom-out').addEventListener('click', () => { S.view.zoom = Math.max(0.1, S.view.zoom / 1.2); updateZoom(); render() })
document.getElementById('zoom-fit').addEventListener('click', fitAll)

document.getElementById('toggle-wires').addEventListener('click', function() {
  S.showWires = !S.showWires
  this.classList.toggle('active', S.showWires)
  render()
})
document.getElementById('toggle-wires').classList.add('active')

function updateZoom() { document.getElementById('zoom-label').textContent = Math.round(S.view.zoom * 100) + '%' }

function fitAll() {
  const wrap = document.getElementById('canvas-wrap').getBoundingClientRect()
  const pad = 60
  S.view.zoom = Math.min((wrap.width - pad*2) / STAGE_W, (wrap.height - pad*2) / STAGE_H)
  S.view.x = pad + (wrap.width  - pad*2 - STAGE_W * S.view.zoom) / 2
  S.view.y = pad + (wrap.height - pad*2 - STAGE_H * S.view.zoom) / 2
  updateZoom(); render()
}

// ── Delete selected ───────────────────────────────────────────────────────────
function deleteSelected() {
  if (!S.selected) return
  if (S.selected.type === 'segment') {
    const ctrl = S.controllers.find(c => c.id === S.selected.controllerId)
    if (ctrl && ctrl.segments.length > 1) {
      ctrl.segments = ctrl.segments.filter(s => s.id !== S.selected.segmentId)
    } else if (ctrl) {
      // Remove whole controller
      S.controllers = S.controllers.filter(c => c.id !== ctrl.id)
    }
  } else if (S.selected.type === 'controller') {
    S.controllers = S.controllers.filter(c => c.id !== S.selected.controllerId)
  } else if (S.selected.type === 'zone') {
    S.zones = S.zones.filter(z => z.id !== S.selected.id)
    S.controllers.forEach(c => { if (c.zoneId === S.selected.id) c.zoneId = null })
  }
  S.selected = null; S.dirty = true
  renderSidebar(); renderProps(); render()
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  // Controllers
  const ctrlList = document.getElementById('ctrl-list')
  ctrlList.innerHTML = ''
  for (const ctrl of S.controllers) {
    const zone = ctrl.zoneId ? S.zones.find(z => z.id === ctrl.zoneId) : null
    const isCtrlSel = S.selected?.controllerId === ctrl.id
    const row = document.createElement('div')
    row.className = 'ctrl-row' + (isCtrlSel ? ' selected' : '')

    const header = document.createElement('div')
    header.className = 'ctrl-row-header'
    header.innerHTML = `
      <div class="ctrl-dot" style="background:${zone ? zone.color : ctrl.color}"></div>
      <div class="ctrl-name">${escH(ctrl.name)}</div>
      ${zone ? `<div class="ctrl-badge" style="color:${zone.color}">${escH(zone.name)}</div>` : ''}
      <button class="ctrl-expand">${ctrl.expanded ? '▾' : '▸'}</button>
      <button class="icon-btn" data-del-ctrl="${ctrl.id}" title="Remove">×</button>
    `
    header.querySelector('.ctrl-expand').addEventListener('click', e => {
      e.stopPropagation(); ctrl.expanded = !ctrl.expanded; renderSidebar()
    })
    header.addEventListener('click', e => {
      if (e.target.closest('[data-del-ctrl]') || e.target.closest('.ctrl-expand')) return
      S.selected = { type: 'controller', controllerId: ctrl.id }
      renderSidebar(); renderProps(); render()
    })
    header.querySelector('[data-del-ctrl]').addEventListener('click', e => {
      e.stopPropagation()
      S.controllers = S.controllers.filter(c => c.id !== ctrl.id)
      if (S.selected?.controllerId === ctrl.id) S.selected = null
      S.dirty = true; renderSidebar(); renderProps(); render()
    })
    row.appendChild(header)

    if (ctrl.expanded) {
      const segsEl = document.createElement('div')
      segsEl.className = 'seg-rows'
      for (const seg of ctrl.segments) {
        const isSel = S.selected?.segmentId === seg.id
        const segRow = document.createElement('div')
        segRow.className = 'seg-row' + (isSel ? ' selected' : '')
        const color = segmentColor(zone ? zone.color : ctrl.color, ctrl.segments.indexOf(seg), ctrl.segments.length)
        segRow.innerHTML = `
          <div class="seg-pip" style="background:${color}"></div>
          <div class="seg-name">${escH(seg.name)}</div>
          <div class="seg-range">${seg.start}–${seg.end}</div>
        `
        segRow.addEventListener('click', () => {
          S.selected = { type: 'segment', controllerId: ctrl.id, segmentId: seg.id }
          renderSidebar(); renderProps(); render()
        })
        segsEl.appendChild(segRow)
      }
      row.appendChild(segsEl)
    }
    ctrlList.appendChild(row)
  }

  // Zones
  const zoneList = document.getElementById('zone-list')
  zoneList.innerHTML = ''
  for (const zone of S.zones) {
    const count = S.controllers.filter(c => c.zoneId === zone.id).length
    const row = document.createElement('div')
    row.className = 'zone-row' + (S.selected?.id === zone.id ? ' selected' : '')
    row.innerHTML = `
      <div class="zone-swatch" style="background:${zone.color}"></div>
      <div class="zone-name">${escH(zone.name)}</div>
      <div class="zone-count">${count}</div>
      <button class="icon-btn" data-del-zone="${zone.id}" title="Remove">×</button>
    `
    row.addEventListener('click', e => {
      if (e.target.closest('[data-del-zone]')) return
      S.selected = { type: 'zone', id: zone.id }
      renderSidebar(); renderProps(); render()
    })
    row.querySelector('[data-del-zone]').addEventListener('click', e => {
      e.stopPropagation()
      S.zones = S.zones.filter(z => z.id !== zone.id)
      S.controllers.forEach(c => { if (c.zoneId === zone.id) c.zoneId = null })
      if (S.selected?.id === zone.id) S.selected = null
      S.dirty = true; renderSidebar(); renderProps(); render()
    })
    zoneList.appendChild(row)
  }
}

// ── Properties panel ──────────────────────────────────────────────────────────
function renderProps() {
  const title = document.getElementById('props-title')
  const body  = document.getElementById('props-body')

  if (!S.selected) {
    title.textContent = 'Nothing selected'
    body.innerHTML = `<div class="prop"><p class="prop-hint" style="padding:.5rem 0;color:var(--dim)">Click a segment on the canvas to select it. Drag to reposition. Shift+drag to move whole controller.</p></div>`
    return
  }

  if (S.selected.type === 'controller') {
    const ctrl = S.controllers.find(c => c.id === S.selected.controllerId)
    if (!ctrl) return
    title.textContent = 'Controller'
    renderControllerProps(ctrl, body)
  } else if (S.selected.type === 'segment') {
    const ctrl = S.controllers.find(c => c.id === S.selected.controllerId)
    const seg  = ctrl?.segments.find(s => s.id === S.selected.segmentId)
    if (!ctrl || !seg) return
    title.textContent = 'Segment'
    renderSegmentProps(ctrl, seg, body)
  } else if (S.selected.type === 'zone') {
    const zone = S.zones.find(z => z.id === S.selected.id)
    if (!zone) return
    title.textContent = 'Zone'
    renderZoneProps(zone, body)
  }
}

// ── Segment helpers ───────────────────────────────────────────────────────────
function addSegmentToController(ctrl) {
  const lastSeg = ctrl.segments[ctrl.segments.length - 1]
  const newStart = lastSeg ? lastSeg.end + 1 : 0
  const newEnd   = Math.max(newStart, ctrl.pixelCount - 1)
  const seg = makeSegment(`Segment ${ctrl.segments.length + 1}`, newStart, newEnd, null, ctrl.segments.length)
  // Place below last segment
  seg.x = lastSeg ? lastSeg.x : STAGE_W / 2
  seg.y = lastSeg ? lastSeg.y + 80 : STAGE_H / 2
  ctrl.segments.push(seg)
}

function renumberSegments(ctrl) {
  ctrl.segments.forEach((s, i) => { s.name = s.name || `Segment ${i + 1}` })
}

function makeSegment(name, start, end, pixels, index = 0, ctrlColor = null) {
  const seg = {
    id: uid(), name,
    start, end,
    x: STAGE_W / 2 + index * 20,
    y: STAGE_H / 2 + index * 60,
    scale: 200,
    pixels: pixels || null,
    _cx: null, _cy: null,
  }
  if (pixels) computeCentroid(seg)
  return seg
}

function computeCentroid(seg) {
  if (!seg.pixels?.length) { seg._cx = 0.5; seg._cy = 0.5; return }
  let sx = 0, sy = 0
  for (const [px, py] of seg.pixels) { sx += px; sy += py }
  seg._cx = sx / seg.pixels.length
  seg._cy = sy / seg.pixels.length
}

// ── Modals ────────────────────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open') }
function closeModal(id) { document.getElementById(id).classList.remove('open') }

document.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', () => closeModal(el.dataset.close)))
document.querySelectorAll('.overlay').forEach(ov => ov.addEventListener('click', e => { if (e.target===ov) closeModal(ov.id) }))

// Add Controller modal
const acSegs = []  // [{start,end}] draft segments for add modal

document.getElementById('btn-add-ctrl').addEventListener('click', () => {
  acSegs.length = 0
  document.getElementById('ac-seg-list').innerHTML = ''
  openModal('modal-add-ctrl')
})

document.getElementById('ac-add-seg').addEventListener('click', () => {
  const px = parseInt(document.getElementById('ac-px').value) || 144
  const last = acSegs[acSegs.length - 1]
  const start = last ? last.end + 1 : 0
  const end   = start + Math.max(0, Math.floor((px - start) / 2) - 1)
  acSegs.push({ start, end })
  renderAcSegs()
})

function renderAcSegs() {
  const el = document.getElementById('ac-seg-list')
  el.innerHTML = ''
  acSegs.forEach((s, i) => {
    const row = document.createElement('div')
    row.style.cssText='display:flex;gap:.3rem;align-items:center'
    row.innerHTML=`
      <input style="flex:1;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:11px;padding:.2rem .4rem;border-radius:3px" placeholder="Name" value="Segment ${i+1}">
      <input type="number" style="width:60px;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:11px;padding:.2rem .3rem;border-radius:3px" value="${s.start}" min="0">
      <span style="color:var(--dim);font-size:10px">–</span>
      <input type="number" style="width:60px;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:11px;padding:.2rem .3rem;border-radius:3px" value="${s.end}" min="0">
      <button style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px" data-rm="${i}">×</button>
    `
    const [nameEl, startEl, endEl] = row.querySelectorAll('input')
    nameEl.addEventListener('input', e => acSegs[i].name = e.target.value)
    startEl.addEventListener('input', e => acSegs[i].start = parseInt(e.target.value)||0)
    endEl.addEventListener('input', e => acSegs[i].end = parseInt(e.target.value)||0)
    row.querySelector('[data-rm]').addEventListener('click', () => { acSegs.splice(i,1); renderAcSegs() })
    el.appendChild(row)
  })
}

document.getElementById('btn-ac-confirm').addEventListener('click', () => {
  const name = document.getElementById('ac-name').value.trim() || 'Controller'
  const ip   = document.getElementById('ac-ip').value.trim() || '0.0.0.0'
  const px   = parseInt(document.getElementById('ac-px').value) || 144
  const geo  = document.getElementById('ac-geo').value

  let segDefs = acSegs.length ? acSegs : [{ start: 0, end: px - 1 }]
  const ctrl = {
    id: uid(), name, ip, pixelCount: px, geometry: geo,
    color: nextCtrlColor(), zoneId: null, expanded: false,
    segments: segDefs.map((s, i) => makeSegment(s.name || `Segment ${i+1}`, s.start, s.end, null, i))
  }
  // Stack segments vertically at stage center
  ctrl.segments.forEach((seg, i) => { seg.x = STAGE_W/2; seg.y = STAGE_H/3 + i * 80 })
  S.controllers.push(ctrl)
  S.selected = { type: 'controller', controllerId: ctrl.id }
  S.dirty = true; closeModal('modal-add-ctrl'); renderSidebar(); renderProps(); render()
})

// Import from Pixelblaze modal
let _pbData = null

document.getElementById('btn-import-pb').addEventListener('click', () => {
  _pbData = null
  document.getElementById('pb-status').textContent = ''
  document.getElementById('pb-status').className = 'status-msg'
  document.getElementById('pb-preview').className = 'import-preview'
  document.getElementById('btn-pb-add').disabled = true
  openModal('modal-import')
})

document.getElementById('btn-pb-connect').addEventListener('click', async () => {
  const ip  = document.getElementById('pb-ip').value.trim()
  const btn = document.getElementById('btn-pb-connect')
  const st  = document.getElementById('pb-status')
  const pre = document.getElementById('pb-preview')
  if (!ip) { st.textContent = 'Enter an IP address'; return }

  btn.disabled = true; st.className = 'status-msg'; st.textContent = 'Connecting…'
  pre.className = 'import-preview'; _pbData = null
  document.getElementById('btn-pb-add').disabled = true

  try {
    const res  = await fetch(`/api/pulsemap/import?ip=${encodeURIComponent(ip)}`)
    const data = await res.json()
    if (data.error) throw new Error(data.error)
    _pbData = data

    st.className = 'status-msg ok'
    st.textContent = `Connected — ${data.name}`

    const segSource = data.segments[0]?.source
    const sourceLabel = segSource === 'expander' ? 'Output Expander config'
                      : segSource === 'heuristic' ? 'auto-detected from pixel map'
                      : 'default (no map)'

    pre.className = 'import-preview show'
    pre.innerHTML =
      `<b style="color:var(--text)">${escH(data.name)}</b><br>` +
      `Pixels: <b style="color:var(--text)">${data.pixelCount}</b><br>` +
      `Map: <b style="color:var(--text)">${data.hasMap ? '✓ imported' : 'not configured'}</b><br>` +
      `Segments: <b style="color:var(--text)">${data.segments.length}</b> (${sourceLabel})<br><br>` +
      data.segments.map((s, i) =>
        `<span class="seg-chip" style="background:var(--surface);color:var(--muted)">
          Seg ${i}: ${s.start}–${s.end} (${s.end-s.start+1}px)
        </span>`
      ).join('')

    document.getElementById('btn-pb-add').disabled = false
  } catch (e) {
    st.className = 'status-msg err'; st.textContent = 'Error: ' + e.message
  } finally {
    btn.disabled = false
  }
})

document.getElementById('btn-pb-add').addEventListener('click', () => {
  if (!_pbData) return
  const color = nextCtrlColor()

  // Determine if geometry is likely 2D
  const geo = _pbData.is3D ? '3d' : (_pbData.hasMap && _pbData.pixels?.some(p => Math.abs(p[1] - 0.5) > 0.08) ? '2d' : '1d')

  const segments = _pbData.segments.map((s, i) => {
    const segPixels = _pbData.pixels ? _pbData.pixels.slice(s.start, s.end + 1) : null
    const seg = makeSegment(`Segment ${i}`, s.start, s.end, segPixels, i, color)
    // Natural stage position from pixel map centroid
    if (segPixels?.length) {
      computeCentroid(seg)
      seg.x = seg._cx * STAGE_W
      seg.y = seg._cy * STAGE_H
    } else {
      seg.x = STAGE_W / 2
      seg.y = STAGE_H / 3 + i * 80
    }
    return seg
  })

  const ctrl = {
    id: uid(), name: _pbData.name, ip: _pbData.ip,
    pixelCount: _pbData.pixelCount, geometry: geo,
    color, zoneId: null, expanded: false, segments
  }
  S.controllers.push(ctrl)
  S.selected = { type: 'controller', controllerId: ctrl.id }
  S.dirty = true; closeModal('modal-import'); renderSidebar(); renderProps(); render()
})

// Add Zone modal
let _azColor = ZONE_COLORS[0]

document.getElementById('btn-add-zone').addEventListener('click', () => {
  _azColor = nextZoneColor()
  document.getElementById('az-name').value = ''
  const row = document.getElementById('az-color-row')
  row.innerHTML = ZONE_COLORS.map(c =>
    `<div class="color-chip${c===_azColor?' sel':''}" data-color="${c}" style="background:${c}"></div>`
  ).join('')
  row.querySelectorAll('.color-chip').forEach(chip => chip.addEventListener('click', () => {
    _azColor = chip.dataset.color
    row.querySelectorAll('.color-chip').forEach(c => c.classList.toggle('sel', c.dataset.color === _azColor))
  }))
  openModal('modal-add-zone')
})

document.getElementById('btn-az-confirm').addEventListener('click', () => {
  const name = document.getElementById('az-name').value.trim() || 'Zone'
  S.zones.push({ id: uid(), name, color: _azColor, controllers: [] })
  S.dirty = true; closeModal('modal-add-zone'); renderSidebar(); render()
})

// ── Topology save / load ──────────────────────────────────────────────────────
function toTopology() {
  return {
    controllers: S.controllers.map(c => ({
      id:         c.id,
      name:       c.name,
      ip:         c.ip,
      pixelCount: c.pixelCount,
      geometry:   c.geometry,
      mapColor:   c.color,
      zoneId:     c.zoneId || null,
      segments:   c.segments.map(s => ({
        id:       s.id,
        name:     s.name,
        start:    s.start,
        end:      s.end,
        stageX:   Math.round(s.x),
        stageY:   Math.round(s.y),
        stageScale: Math.round(s.scale),
        pixels:   s.pixels ? s.pixels.map(p => p.map(v => parseFloat(v.toFixed(4)))) : null,
      })),
    })),
    zones: S.zones.map(z => ({
      id:          z.id,
      name:        z.name,
      mapColor:    z.color,
      geometry:    S.controllers.find(c => c.zoneId === z.id)?.geometry || '1d',
      controllers: S.controllers.filter(c => c.zoneId === z.id).map(c => c.id),
    })),
  }
}

function fromTopology(topo) {
  S.controllers = (topo.controllers || []).map(c => ({
    id:         c.id || uid(),
    name:       c.name || c.id || 'Controller',
    ip:         c.ip || '',
    pixelCount: c.pixelCount || 0,
    geometry:   c.geometry || '1d',
    color:      c.mapColor || nextCtrlColor(),
    zoneId:     c.zoneId || null,
    expanded:   false,
    segments:   (c.segments || [{ id: uid(), name: 'Segment 0', start: 0, end: Math.max(0,(c.pixelCount||1)-1), stageX: STAGE_W/2, stageY: STAGE_H/2, stageScale: 200 }])
      .map(s => {
        const seg = {
          id:     s.id || uid(),
          name:   s.name || 'Segment',
          start:  s.start ?? 0,
          end:    s.end   ?? 0,
          x:      s.stageX ?? STAGE_W/2,
          y:      s.stageY ?? STAGE_H/2,
          scale:  s.stageScale ?? 200,
          pixels: s.pixels || null,
          _cx: null, _cy: null,
        }
        if (seg.pixels) computeCentroid(seg)
        return seg
      }),
  }))
  S.zones = (topo.zones || []).map(z => ({
    id:   z.id || uid(),
    name: z.name || 'Zone',
    color: z.mapColor || nextZoneColor(),
    controllers: z.controllers || [],
  }))
  // Restore zoneId on controllers
  for (const zone of S.zones) {
    for (const ctrlId of zone.controllers) {
      const ctrl = S.controllers.find(c => c.id === ctrlId)
      if (ctrl) ctrl.zoneId = zone.id
    }
  }
}

document.getElementById('btn-save').addEventListener('click', async () => {
  try {
    const res = await fetch('/api/topology', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(toTopology()) })
    const data = await res.json()
    if (data.ok) {
      S.dirty = false
      document.getElementById('btn-save').textContent = 'Saved ✓'
      setTimeout(() => document.getElementById('btn-save').textContent = 'Save Topology', 2000)
    }
  } catch (e) { alert('Save failed: ' + e.message) }
})

document.getElementById('btn-load').addEventListener('click', async () => {
  try {
    const res = await fetch('/api/topology')
    fromTopology(await res.json())
    S.selected = null; S.dirty = false
    renderSidebar(); renderProps(); render()
  } catch (e) { alert('Load failed: ' + e.message) }
})

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('resize', resize)

;(async () => {
  try { fromTopology(await fetch('/api/topology').then(r => r.json())) }
  catch (_) {}
  renderSidebar(); renderProps(); resize(); fitAll()
})()
</script>
